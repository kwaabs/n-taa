# Production stack — postgres + martin + api + web
# Usage:
#   cp infra/.env.prod.example infra/.env.prod
#   # edit infra/.env.prod
#   docker compose --env-file infra/.env.prod -f infra/docker-compose.prod.yaml up -d --build

name: geo-app-prod

networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local

services:
  # ─── Postgres (Supabase PostGIS-enabled image) ──────────
  postgres:
    image: supabase/postgres:15.1.1.55
    container_name: geo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # These pass through to bootstrap.sql
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ─── Martin tile server ────────────────────────────────
  martin:
    image: ghcr.io/maplibre/martin:latest
    container_name: geo-martin
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${APP_DB_USER}:${APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    volumes:
      - ./martin/config.yaml:/config.yaml:ro
    command: ["--config", "/config.yaml"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net
    ports:
      # Exposed publicly so tile_url in DB can point directly.
      # Comment this out and use the nginx /tiles/ proxy if you prefer.
      - "5441:3000"

  # ─── Go API ────────────────────────────────────────────
  api:
    build:
      context: services/api
      dockerfile: Dockerfile
    container_name: geo-api
    restart: unless-stopped
    environment:
      API_ENV: ${API_ENV}
      API_LOG_LEVEL: ${API_LOG_LEVEL}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      DATABASE_URL: ${DATABASE_URL}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      JWT_ISSUER: ${JWT_ISSUER}
      SUPERUSER_EMAIL: ${SUPERUSER_EMAIL}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD}
      SUPERUSER_NAME: ${SUPERUSER_NAME}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      COOKIE_SECURE: ${COOKIE_SECURE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5442/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s

  # ─── Frontend (nginx serving built Vite bundle + API proxy) ──
  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        # Empty → same-origin. nginx routes /api/* to the api container.
        VITE_API_URL: ""
    container_name: geo-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app_net
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
