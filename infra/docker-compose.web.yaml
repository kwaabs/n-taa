name: geo-web-prod

networks:
  coolify:
    external: true

services:
  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: 'https://taa-svr.ntaa.ecggh.com'   # baked at build time
    container_name: geo-web
    environment:
      SERVICE_FQDN_WEB_80: 'https://<your-web-domain>'    # Coolify routing hint
    networks:
      - coolify
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/healthz']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s