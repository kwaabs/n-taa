name: geo-web-prod

networks:
  coolify:
    external: true

services:
  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: 'https://api.example.com'   # your real api domain (build-time)
    container_name: geo-web
    # no restart: line while stabilizing -> add "unless-stopped" later
    environment:
      SERVICE_FQDN_WEB_80: 'https://app.example.com'   # pinned = one clean URL, port 80
    networks:
      - coolify
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/healthz']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s