name: geo-web-prod

networks:
  app_net:
    driver: bridge

services:
  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: 'https://api.example.com'
    container_name: geo-web
    restart: unless-stopped
    networks:
      - app_net
    labels:
      - traefik.enable=true
      - traefik.http.routers.geo-web-http.entryPoints=http
      - 'traefik.http.routers.geo-web-http.rule=Host(`app.example.com`)'
      - traefik.http.routers.geo-web-http.service=geo-web-svc
      - traefik.http.routers.geo-web-http.middlewares=redirect-to-https
      - traefik.http.routers.geo-web-https.entryPoints=https
      - 'traefik.http.routers.geo-web-https.rule=Host(`app.example.com`)'
      - traefik.http.routers.geo-web-https.service=geo-web-svc
      - traefik.http.routers.geo-web-https.tls=true
      - traefik.http.routers.geo-web-https.tls.certresolver=letsencrypt
      - traefik.http.routers.geo-web-https.middlewares=gzip
      - traefik.http.services.geo-web-svc.loadbalancer.server.port=80
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/healthz']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s