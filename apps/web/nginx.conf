server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/geo+json image/svg+xml;
    gzip_min_length 1024;

    # ─── SPA — client-side routing fallback ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Static assets — long cache ──────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── API proxy ───────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:5442;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for streaming (CSV/GeoJSON exports of large tables)
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;

        # Allow large POST bodies (search geometries can be big)
        client_max_body_size 10m;
    }

    # ─── Martin tile proxy (optional) ────────────────────────
    # If you want tile URLs to be same-origin, uncomment and update
    # the layers.tile_url in the DB to use /tiles/... instead of :5441/...
    #
    # location /tiles/ {
    #     proxy_pass http://martin:3000/;
    #     proxy_set_header Host $host;
    #     proxy_cache_valid 200 1h;
    # }

    # Simple health endpoint for load balancer
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
